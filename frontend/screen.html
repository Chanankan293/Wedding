<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<title>Wedding Wishes Screen</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="screen">

<div id="wishBox">

<h2 id="wishMessage">💐 Wedding Wishes 💐</h2>

<p id="wishName">Share your love with us</p>

<div class="couple">
Girl & Man
</div>

<div class="date">
10 March 2026
</div>

</div>

<script>

let wishes=[]
let index=0

async function loadWishes(){

const res = await fetch("/api/wishes")
const data = await res.json()

wishes = data.data

}

function showWish(){

if(wishes.length===0)return

const box = document.getElementById("wishBox")

box.style.opacity = 0

setTimeout(()=>{

const wish = wishes[index]

document.getElementById("wishMessage").innerText = wish.message
document.getElementById("wishName").innerText = "- " + wish.guestName

box.style.opacity = 1

index++

if(index>=wishes.length){
index=0
}

},800)

}

setInterval(loadWishes,5000)
setInterval(showWish,7000)

loadWishes()
showWish()

</script>

</body>
</html>
