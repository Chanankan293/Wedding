<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Wish Wall</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.landing-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffd9e8 0%, #fff5f7 100%);
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .landing-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }

        .landing-container h1 {
            color: #e91e63;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .landing-container p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-link {
            display: inline-block;
            padding: 15px 40px;
            margin: 10px;
            border-radius: 50px;
            font-size: 1.1em;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-guest {
            background: linear-gradient(135deg, #ffa9d5 0%, #ff6b9d 100%);
            color: white;
        }

        .btn-guest:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
        }

        .btn-screen {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: white;
        }

        .btn-screen:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(168, 237, 234, 0.3);
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="landing-page">
    <div class="landing-container">
        <div class="emoji">💍</div>
        <h1>Wedding Wish Wall</h1>
        <p>Girl & Man<br>10 March 2026</p>

        <div class="button-group">
            <a href="guest.html" class="btn-link btn-guest">✍️ Write Wish</a>
            <a href="screen.html" class="btn-link btn-screen">🎬 View Wishes</a>
        </div>
    </div>
</body>
</html>
